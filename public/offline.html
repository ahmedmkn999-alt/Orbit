<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit - غير متصل</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0118 0%, #1a0a2e 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    
    .container {
      max-width: 400px;
    }
    
    .logo {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(to right, #00f5ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.5));
      }
      to {
        filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.8));
      }
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    p {
      color: #999;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .button {
      background: linear-gradient(to right, #00f5ff, #8b5cf6);
      color: black;
      border: none;
      padding: 15px 40px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .button:hover {
      transform: scale(1.05);
    }
    
    .cached-content {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .cached-content h3 {
      margin-bottom: 15px;
      color: #00f5ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ORBIT</div>
    <div class="icon">📡</div>
    <h1>غير متصل بالإنترنت</h1>
    <p>
      يبدو أنك غير متصل بالإنترنت حالياً. 
      لا تقلق، يمكنك استعراض المحتوى المحفوظ مسبقاً.
    </p>
    <button class="button" onclick="location.reload()">
      إعادة المحاولة
    </button>
    
    <div class="cached-content">
      <h3>✨ المحتوى المحفوظ متاح</h3>
      <p style="font-size: 14px;">
        يمكنك استعراض المنشورات والرسائل التي شاهدتها مسبقاً
      </p>
    </div>
  </div>
  
  <script>
    // Check connection periodically
    setInterval(() => {
      if (navigator.onLine) {
        location.reload();
      }
    }, 3000);
    
    // Listen for online event
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
